services:
  web:
    image: display-web:local
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      # Set both origins explicitly in .env. They must point to this instance.
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:?PUBLIC_APP_URL must be set}
      PUBLIC_DISPLAY_URL: ${PUBLIC_DISPLAY_URL:?PUBLIC_DISPLAY_URL must be set}
      ANDROID_APK_URL: ${ANDROID_APK_URL:-}
      SECRET_STORE_MASTER_KEY: ${SECRET_STORE_MASTER_KEY}
      COLLECTOR_TOKEN: ${COLLECTOR_TOKEN}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME:-Authentik}
      LOCAL_AUTH_ENABLED: ${LOCAL_AUTH_ENABLED:-true}
      OIDC_ALLOW_SIGNUP: ${OIDC_ALLOW_SIGNUP:-true}
    ports:
      - "${WEB_PORT:-3000}:3000"
  collector:
    image: display-web:local
    restart: unless-stopped
    depends_on:
      - web
    environment:
      COLLECTOR_TOKEN: ${COLLECTOR_TOKEN}
    command: ["sh", "-c", "while true; do wget -qO- --header=\"Authorization: Bearer $${COLLECTOR_TOKEN}\" --post-data='' http://web:3000/api/internal/collector || true; sleep 10; done"]

# Supabase itself is operated with the official self-hosted Supabase stack.
# For local development use `npm run supabase:start`.
