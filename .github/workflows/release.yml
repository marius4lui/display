name: Android release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: Restore Android signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.DISPLAY_SIGNING_KEY_BASE64 }}
        run: echo "$SIGNING_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/display-release.jks"
      - name: Build signed APK
        env:
          DISPLAY_SIGNING_STORE_FILE: ${{ runner.temp }}/display-release.jks
          DISPLAY_SIGNING_STORE_PASSWORD: ${{ secrets.DISPLAY_SIGNING_STORE_PASSWORD }}
          DISPLAY_SIGNING_KEY_ALIAS: ${{ secrets.DISPLAY_SIGNING_KEY_ALIAS }}
          DISPLAY_SIGNING_KEY_PASSWORD: ${{ secrets.DISPLAY_SIGNING_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease
        working-directory: apps/mobile
      - name: Match app version to tag
        run: |
          version=$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' apps/mobile/app/build.gradle.kts)
          test "v$version" = "$GITHUB_REF_NAME"
      - name: Verify signature
        run: |
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose apps/mobile/app/build/outputs/apk/release/app-release.apk
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp apps/mobile/app/build/outputs/apk/release/app-release.apk "$RUNNER_TEMP/display.apk"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$RUNNER_TEMP/display.apk" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$RUNNER_TEMP/display.apk" --generate-notes --verify-tag
          fi
